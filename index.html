<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コンプレッサースキル管理システム - Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        .animate-spin-slow { animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // --- Firebase Modules ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- Firebase Configuration ---
        // 公開時はここをご自身の設定に書き換えてください
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'compressor-skill-app-html';

        const ADMIN_PIN = "1234";

        const SKILL_CATEGORIES = [
            { id: 'daily', title: "日常点検", icon: "Activity", description: "異常の早期発見と点検ルールの遵守", levels: [
                "異音・異臭・オイルレベル等の「いつもと違う」に気づき報告できる。点検ルールを理解している。",
                "決まったルートで点検し、圧力・温度・時間を正しく記録。油漏れ等の目視確認ができる。",
                "一人で全ての点検項目を完遂でき、数値が正常範囲内か即座に判断・適切な処置ができる。",
                "微細な振動や音の変化から故障を予見。一次対応（増し締め、調整等）を安全に行える。",
                "点検項目の見直しや効率化を提案。後輩に点検の勘所や重要性を論理的に教育できる。"
            ]},
            { id: 'filter', title: "吸い込みフィルター交換", icon: "Search", description: "吸気環境の維持と清掃管理", levels: [
                "フィルターの役割と目詰まり時の影響（性能低下・加熱）を理解している。",
                "清掃手順を理解し、エアブロー等での目詰まり除去・周辺清掃を一人で行える。",
                "フィルターの交換時期を判断し、予備品管理を含めた交換作業をミスなく完遂できる。",
                "汚れ具合から設置環境の異常（粉塵増等）を察知。プレフィルタ等の追加を提案できる。",
                "環境負荷に応じた最適交換サイクルを策定。メンテナンスコスト低減案を立案できる。"
            ]},
            { id: 'oil', title: "オイル交換", icon: "Settings2", description: "潤滑管理と内部劣化診断", levels: [
                "オイルの役割、種類、高温時の危険性を理解。不足時の継ぎ足しができる。",
                "指示に従い、廃油受けの設置や準備を行い、安全な手順で抜き取り作業を補助できる。",
                "一人で全量の抜き取り・規定量の充填・廃油処理・漏れ確認まで確実に完遂できる。",
                "抜いたオイルの色、臭い、金属粉から内部部品の摩耗や水分混入を診断・報告できる。",
                "オイル分析結果に基づいた保全計画を立案。フラッシング等の高度な処置を指揮できる。"
            ]},
            { id: 'element', title: "オイルエレメント交換", icon: "Wrench", description: "ろ過機能の維持と油圧管理", levels: [
                "エレメントの役割と、未交換によるトラブル（焼付き等）のリスクを理解している。",
                "専用工具（フィルタレンチ）の使い方を理解し、安全に補助作業ができる。",
                "一人で旧品の取り外し・パッキン確認・新品の確実な装着・漏れ確認を完遂できる。",
                "締付トルク管理を徹底。周辺部品（Oリング等）の同時交換や劣化判断を的確に行える。",
                "不具合発生時にエレメントを分解・調査し、原因究明と再発防止策を立案できる。"
            ]},
            { id: 'grease', title: "グリスアップ", icon: "Award", description: "回転部の長寿命化と給脂管理", levels: [
                "給脂箇所（モーター、ファン等）の場所と、過不足による害を理解している。",
                "グリスガンの使い方を習得し、指示された箇所に適切な量を安全に注入できる。",
                "一人で全箇所の管理を完遂。グリスの使い分けや、古いグリスの排出確認ができる。",
                "注入時の圧力を感じ取り、ベアリングの初期異常（固着等）を感知・報告できる。",
                "自動給脂装置の管理や、運転時間に応じた最適給脂計画の策定・改善ができる。"
            ]},
            { id: 'efficiency', title: "効率運転・システム管理", icon: "BarChart3", description: "省エネ・エアシステム全体の最適化", levels: [
                "ドライヤーの電源管理やドレン排出の重要性を理解し、基本的なバルブ操作ができる。",
                "システム図を理解し、異常時に手動バルブ等でバックアップ系統へ切り替えられる。",
                "露点管理、圧力損失の計測、台数制御設定の確認を一人で確実に行える。",
                "電力計やエア流量計から無駄を特定。エア漏れ検知や圧力低減などの改善を行える。",
                "工場全体のエア供給システム（配管径、増設、インバータ化）を最適設計・推進できる。"
            ]}
        ];

        // アイコンコンポーネント (エラー修正版: 公式の createIcons を利用)
        const Icon = ({ name, size = 20, className = "" }) => {
            const spanRef = React.useRef(null);
            
            React.useEffect(() => {
                if (spanRef.current && window.lucide) {
                    // 古いSVGをクリア
                    spanRef.current.innerHTML = '';
                    
                    // Lucideが置換するためのiタグを作成
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    spanRef.current.appendChild(i);
                    
                    // createIconsでSVGに置換
                    window.lucide.createIcons({
                        root: spanRef.current,
                        attrs: {
                            class: className,
                            width: size,
                            height: size
                        }
                    });
                }
            }, [name, size, className]);

            return <span ref={spanRef} className="inline-flex items-center justify-center"></span>;
        };

        const App = () => {
            const [user, setUser] = React.useState(null);
            const [members, setMembers] = React.useState([]);
            const [selectedMemberId, setSelectedMemberId] = React.useState(null);
            const [activeTab, setActiveTab] = React.useState('dashboard');
            const [loading, setLoading] = React.useState(true);
            const [saveStatus, setSaveStatus] = React.useState(null);
            
            const [isAddModalOpen, setIsAddModalOpen] = React.useState(false);
            const [isQrModalOpen, setIsQrModalOpen] = React.useState(false);
            const [isPinModalOpen, setIsPinModalOpen] = React.useState(false);
            const [isDeleteModalOpen, setIsDeleteModalOpen] = React.useState(false);
            
            const [newMemberName, setNewMemberName] = React.useState('');
            const [pinInput, setPinInput] = React.useState('');
            const [pinError, setPinError] = React.useState(false);
            const [isFullscreen, setIsFullscreen] = React.useState(false);
            const [hideUI, setHideUI] = React.useState(false);

            // Auth
            React.useEffect(() => {
                const init = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                init();
                onAuthStateChanged(auth, setUser);
            }, []);

            // Fetch
            React.useEffect(() => {
                if (!user) return;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'members');
                const unsub = onSnapshot(q, (snapshot) => {
                    const list = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setMembers(list);
                    if (list.length > 0 && !selectedMemberId) setSelectedMemberId(list[0].id);
                    setLoading(false);
                });
                return () => unsub();
            }, [user, selectedMemberId]);

            const selectedMember = React.useMemo(() => members.find(m => m.id === selectedMemberId), [members, selectedMemberId]);
            const skillLevels = selectedMember?.skills || {};
            const isLocked = selectedMember?.isLocked || false;

            const handleLevelUpdate = async (catId, level) => {
                if (!selectedMemberId || isLocked) return;
                const newSkills = { ...skillLevels, [catId]: level };
                setSaveStatus('saving');
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', selectedMemberId), { ...selectedMember, skills: newSkills }, { merge: true });
                setSaveStatus('success');
                setTimeout(() => setSaveStatus(null), 2000);
            };

            const toggleLock = async () => {
                if (pinInput === ADMIN_PIN) {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', selectedMemberId), { ...selectedMember, isLocked: !isLocked }, { merge: true });
                    setIsPinModalOpen(false);
                    setPinInput('');
                    setPinError(false);
                } else {
                    setPinError(true);
                }
            };

            const deleteMember = async () => {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', selectedMemberId));
                setIsDeleteModalOpen(false);
                setSelectedMemberId(null);
            };

            const addMember = async (name = null) => {
                const target = name || newMemberName;
                if (!target) return;
                const ref = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'members'), {
                    name: target,
                    skills: name ? { daily: 3, filter: 2, oil: 1, element: 1, grease: 2, efficiency: 1 } : {},
                    isLocked: false,
                    createdAt: new Date().toISOString()
                });
                setSelectedMemberId(ref.id);
                setIsAddModalOpen(false);
                setNewMemberName('');
            };

            const average = React.useMemo(() => {
                const vals = Object.values(skillLevels);
                return vals.length ? (vals.reduce((a, b) => a + b, 0) / SKILL_CATEGORIES.length).toFixed(1) : "0.0";
            }, [skillLevels]);

            const exportCSV = () => {
                const headers = "カテゴリー,レベル,基準\n";
                const rows = SKILL_CATEGORIES.map(c => `${c.title},${skillLevels[c.id]||0},${c.levels[(skillLevels[c.id]||1)-1]}`).join("\n");
                const blob = new Blob(["\ufeff" + headers + rows], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `${selectedMember?.name || 'Skill'}_Matrix.csv`;
                link.click();
            };

            if (loading) return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-slate-900 text-white">
                    <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                    <div className="mt-4 font-black uppercase text-xs tracking-[0.3em] text-blue-400">Loading System</div>
                </div>
            );

            return (
                <div className={isFullscreen ? "fixed inset-0 z-[100] bg-slate-50 overflow-y-auto pb-20" : "min-h-screen bg-slate-50 pb-20"}>
                    {isFullscreen && (
                        <div className="fixed top-4 right-4 z-[150] flex gap-2">
                            <button onClick={() => setHideUI(!hideUI)} className="p-2 bg-white/90 shadow-lg rounded-full text-slate-600 border border-slate-200">
                                <Icon name={hideUI ? "Eye" : "EyeOff"} size={20} />
                            </button>
                            <button onClick={() => setIsFullscreen(false)} className="p-2 bg-red-500 shadow-lg rounded-full text-white">
                                <Icon name="X" size={20} />
                            </button>
                        </div>
                    )}

                    {!hideUI && (
                        <nav className="bg-white border-b border-slate-200 sticky top-0 z-30 px-4 py-3 shadow-sm">
                            <div className="max-w-5xl mx-auto flex items-center justify-between">
                                <div className="flex items-center gap-2">
                                    <div className="bg-blue-600 p-1.5 rounded-lg shadow-lg shadow-blue-100 text-white">
                                        <Icon name="Settings2" />
                                    </div>
                                    <span className="font-bold text-lg tracking-tight hidden sm:inline">COMP-SKILL Pro</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <button onClick={() => setIsQrModalOpen(true)} className="p-2 bg-slate-100 rounded-xl hover:bg-slate-200 border border-slate-200"><Icon name="QrCode" size={18}/></button>
                                    <button onClick={() => setIsFullscreen(!isFullscreen)} className="p-2 bg-slate-100 rounded-xl border border-slate-200"><Icon name={isFullscreen ? "Minimize2" : "Maximize2"} size={18}/></button>
                                    <div className="relative flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-xl border border-slate-200">
                                        <Icon name="Users" size={16} className="text-slate-500" />
                                        <select className="bg-transparent text-sm font-bold focus:outline-none appearance-none pr-6 cursor-pointer max-w-[100px] sm:max-w-[150px] truncate" value={selectedMemberId || ''} onChange={e => setSelectedMemberId(e.target.value)}>
                                            {members.map(m => <option key={m.id} value={m.id}>{m.isLocked ? "🔒 " : ""}{m.name}</option>)}
                                            {members.length === 0 && <option value="">未登録</option>}
                                        </select>
                                    </div>
                                    <button onClick={() => setIsAddModalOpen(true)} className="p-2 bg-blue-50 text-blue-600 rounded-xl border border-blue-100"><Icon name="UserPlus" size={18}/></button>
                                    <button onClick={exportCSV} disabled={!selectedMember} className="hidden sm:flex items-center gap-2 px-3 py-1.5 text-sm font-bold bg-slate-800 text-white rounded-xl active:scale-95 transition-all"><Icon name="Download" size={16} /> CSV</button>
                                </div>
                            </div>
                        </nav>
                    )}

                    <main className={`max-w-5xl mx-auto p-4 md:p-6 space-y-6 ${hideUI ? 'pt-20' : ''}`}>
                        {!selectedMemberId && members.length === 0 ? (
                            <div className="bg-white border-2 border-dashed border-slate-200 rounded-[3rem] p-12 text-center shadow-sm">
                                <Icon name="Database" size={48} className="mx-auto mb-6 text-blue-500" />
                                <h3 className="text-2xl font-black text-slate-800 mb-2">データがありません</h3>
                                <p className="text-slate-500 mb-10 max-w-sm mx-auto font-medium">メンバーを登録して開始してください。</p>
                                <div className="flex flex-col sm:flex-row gap-4 justify-center">
                                    <button onClick={() => setIsAddModalOpen(true)} className="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black shadow-xl shadow-blue-200 flex items-center justify-center gap-2"><Icon name="UserPlus" size={20} /> メンバー登録</button>
                                    <button onClick={() => addMember("サンプル保全員")} className="bg-white text-slate-700 border border-slate-200 px-8 py-4 rounded-2xl font-black flex items-center justify-center gap-2"><Icon name="Database" size={20} /> サンプルデータ</button>
                                </div>
                            </div>
                        ) : (
                            <>
                                <div className={`bg-gradient-to-br from-indigo-700 via-blue-700 to-blue-900 rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden transition-all ${hideUI ? 'opacity-80 scale-95' : ''}`}>
                                    <div className="absolute top-0 right-0 w-80 h-80 bg-white/10 rounded-full -translate-y-1/2 translate-x-1/2 blur-3xl"></div>
                                    <div className="relative z-10 flex flex-col md:flex-row justify-between items-center gap-8">
                                        <div>
                                            <div className="flex items-center gap-2 mb-2">
                                                <span className="bg-white/20 px-3 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-widest backdrop-blur-sm">Skill Matrix</span>
                                                {!hideUI && (
                                                    <div className="flex gap-2">
                                                        <button onClick={() => setIsPinModalOpen(true)} className={`px-3 py-0.5 rounded-full text-[10px] font-black uppercase flex items-center gap-1 backdrop-blur-md ${isLocked ? 'bg-orange-500' : 'bg-white/10'}`}>
                                                            <Icon name={isLocked ? "Lock" : "Unlock"} size={12} /> {isLocked ? "Locked" : "Unlocked"}
                                                        </button>
                                                        <button onClick={() => setIsDeleteModalOpen(true)} className="px-3 py-0.5 rounded-full text-[10px] font-black uppercase bg-red-500/80 flex items-center gap-1">
                                                            <Icon name="Trash2" size={12} /> Delete
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                            <h2 className="text-4xl font-black mb-1">{selectedMember?.name}</h2>
                                            <p className="text-blue-100 text-sm font-medium opacity-80">Skill Proficiency Index</p>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 w-full md:w-auto">
                                            <div className="bg-white/10 backdrop-blur-md rounded-3xl p-5 border border-white/10 text-center min-w-[140px]">
                                                <div className="text-[10px] text-blue-200 mb-1 font-black uppercase tracking-widest">Average</div>
                                                <div className="text-3xl font-black">{average}</div>
                                            </div>
                                            <div className="bg-white/10 backdrop-blur-md rounded-3xl p-5 border border-white/10 text-center min-w-[140px]">
                                                <div className="text-[10px] text-blue-200 mb-1 font-black uppercase tracking-widest">Expertise</div>
                                                <div className="text-3xl font-black">{Object.values(skillLevels).filter(v => v >= 3).length} <span className="text-sm font-normal text-blue-300">/ 6</span></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {!hideUI && (
                                    <div className="flex bg-white p-1.5 rounded-2xl border border-slate-200 shadow-sm">
                                        <button onClick={() => setActiveTab('dashboard')} className={`flex-1 flex items-center justify-center gap-2 py-3.5 rounded-xl text-sm font-bold transition-all ${activeTab === 'dashboard' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500'}`}><Icon name="LayoutDashboard" size={18} /> ダッシュボード</button>
                                        <button onClick={() => setActiveTab('details')} className={`flex-1 flex items-center justify-center gap-2 py-3.5 rounded-xl text-sm font-bold transition-all ${activeTab === 'details' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500'}`}><Icon name="BookOpen" size={18} /> スキル定義詳細</button>
                                    </div>
                                )}

                                {activeTab === 'dashboard' ? (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {SKILL_CATEGORIES.map((cat) => (
                                            <div key={cat.id} className={`bg-white rounded-[2rem] border p-6 shadow-sm transition-all overflow-hidden relative ${isLocked ? 'bg-slate-50/50' : 'hover:shadow-xl hover:-translate-y-1'}`}>
                                                <div className="flex items-center gap-4 mb-6">
                                                    <div className={`p-3 rounded-2xl transition-all shadow-sm ${isLocked ? 'text-slate-400 bg-slate-100' : 'text-slate-700 bg-slate-50'}`}><Icon name={cat.icon} size={24}/></div>
                                                    <div className="flex-1">
                                                        <h3 className={`font-black text-lg ${isLocked ? 'text-slate-500' : 'text-slate-800'}`}>{cat.title}</h3>
                                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest truncate">{cat.description}</p>
                                                    </div>
                                                </div>
                                                <div className="flex gap-1.5 mb-6">
                                                    {[1, 2, 3, 4, 5].map(lv => {
                                                        const isSelected = (skillLevels[cat.id] || 0) >= lv;
                                                        const btnClass = isSelected 
                                                            ? (isLocked ? 'bg-slate-300 border-slate-300 text-white' : (lv >= 5 ? 'bg-orange-500 border-orange-500 text-white' : lv >= 3 ? 'bg-blue-600 border-blue-600 text-white' : 'bg-blue-400 border-blue-400 text-white')) 
                                                            : 'bg-white border-slate-100 text-slate-300 hover:border-blue-200';
                                                        return <button key={lv} onClick={() => handleLevelUpdate(cat.id, lv)} disabled={isLocked} className={`flex-1 h-12 rounded-xl font-black text-sm transition-all border-2 ${btnClass}`}>{lv}</button>;
                                                    })}
                                                </div>
                                                <div className="rounded-2xl p-4 border bg-slate-50 border-slate-100 text-slate-600 italic text-xs leading-relaxed line-clamp-2">{cat.levels[(skillLevels[cat.id] || 1) - 1]}</div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="space-y-8">
                                        {SKILL_CATEGORIES.map((cat) => (
                                            <div key={cat.id} className="bg-white rounded-[2.5rem] border border-slate-200 overflow-hidden shadow-sm">
                                                <div className="bg-slate-900 px-8 py-6 text-white flex items-center gap-4"><Icon name={cat.icon} size={24} className="text-blue-400" /><div><h3 className="font-black text-xl">{cat.title}</h3><p className="text-slate-400 text-[10px] uppercase tracking-widest">{cat.description}</p></div></div>
                                                <div className="p-8 space-y-4">
                                                    {cat.levels.map((text, idx) => (
                                                        <div key={idx} onClick={() => handleLevelUpdate(cat.id, idx + 1)} className={`group flex gap-6 p-6 rounded-3xl border-2 transition-all ${isLocked ? 'cursor-not-allowed' : 'cursor-pointer'} ${(skillLevels[cat.id]||0) === idx+1 ? 'bg-blue-50 border-blue-400' : 'bg-white border-slate-50'}`}>
                                                            <div className={`w-14 h-14 rounded-2xl flex items-center justify-center flex-shrink-0 font-black text-2xl ${(skillLevels[cat.id]||0) >= idx+1 ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-300'}`}>{idx+1}</div>
                                                            <div className="flex-1"><div className="flex items-center gap-3 mb-2"><span className={`text-[10px] font-black uppercase px-3 py-1 rounded-full ${idx+1===5?'bg-orange-100 text-orange-600':idx+1>=3?'bg-blue-100 text-blue-600':'bg-slate-100'}`}>Level {idx+1}</span>{(skillLevels[cat.id]||0)===idx+1 && <Icon name="CheckCircle" size={18} className="text-blue-600"/>}</div><p className="text-sm font-bold text-slate-700">{text}</p></div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </>
                        )}
                    </main>

                    {/* Modals (PIN, Add, Delete, QR) */}
                    {isPinModalOpen && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-white rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl text-center">
                                <Icon name="KeyRound" size={32} className="mx-auto mb-6 text-blue-600" />
                                <h3 className="text-2xl font-black text-slate-800 mb-2">管理者認証</h3>
                                <p className="text-xs text-slate-500 mb-6 font-bold">{isLocked ? "ロックを解除します。" : "評価を確定します。"}PINを入力してください。</p>
                                <input type="password" pattern="[0-9]*" inputMode="numeric" maxLength="4" placeholder="••••" autoFocus className={`w-full text-center tracking-[1em] px-6 py-4 bg-slate-50 border-2 rounded-2xl focus:outline-none font-black text-2xl ${pinError ? 'border-red-400' : 'border-slate-100'}`} value={pinInput} onChange={e => {setPinInput(e.target.value); setPinError(false)}} onKeyDown={e => e.key === 'Enter' && toggleLock()} />
                                <div className="flex gap-3 mt-8"><button onClick={() => {setIsPinModalOpen(false); setPinInput('')}} className="flex-1 bg-slate-100 py-4 rounded-2xl font-black text-slate-700">戻る</button><button onClick={toggleLock} className="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black">実行</button></div>
                            </div>
                        </div>
                    )}

                    {isAddModalOpen && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white rounded-[2.5rem] p-8 w-full max-w-md shadow-2xl">
                                <h3 className="text-2xl font-black text-slate-800 mb-6">新規メンバー登録</h3>
                                <input type="text" placeholder="名前を入力..." autoFocus className="w-full px-6 py-5 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:outline-none focus:border-blue-500 font-black text-lg" value={newMemberName} onChange={e => setNewMemberName(e.target.value)} onKeyDown={e => e.key === 'Enter' && addMember()} />
                                <button onClick={() => addMember()} className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black mt-6 shadow-xl shadow-blue-100">登録を確定</button>
                                <button onClick={() => setIsAddModalOpen(false)} className="w-full py-4 text-slate-400 font-bold mt-2">キャンセル</button>
                            </div>
                        </div>
                    )}

                    {isDeleteModalOpen && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl text-center">
                                <Icon name="Trash2" size={32} className="mx-auto mb-6 text-red-500" />
                                <h3 className="text-2xl font-black text-slate-800 mb-2">メンバー削除</h3>
                                <p className="text-sm font-bold text-slate-500 mb-8">「{selectedMember?.name}」を削除しますか？<br/>この操作は戻せません。</p>
                                <div className="flex gap-3"><button onClick={() => setIsDeleteModalOpen(false)} className="flex-1 bg-slate-100 py-4 rounded-2xl font-black text-slate-700">いいえ</button><button onClick={deleteMember} className="flex-1 bg-red-600 text-white py-4 rounded-2xl font-black">削除する</button></div>
                            </div>
                        </div>
                    )}

                    {isQrModalOpen && (
                        <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl text-center">
                                <h3 className="text-2xl font-black text-slate-800 mb-6">現場アクセスQR</h3>
                                <div className="bg-slate-50 p-6 rounded-3xl border border-slate-100 mb-8 shadow-inner">
                                    <img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(window.location.href)}`} className="w-48 h-48 mx-auto" alt="QR" />
                                </div>
                                <button onClick={() => setIsQrModalOpen(false)} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black">閉じる</button>
                            </div>
                        </div>
                    )}

                    {/* Mobile Footer Export */}
                    {!hideUI && (
                        <div className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-lg border-t border-slate-200 p-4 sm:hidden flex justify-center z-20">
                            <button onClick={exportCSV} disabled={!selectedMember} className="flex-1 flex items-center justify-center gap-2 py-4 bg-slate-900 text-white rounded-2xl font-black shadow-xl disabled:opacity-50"><Icon name="Download" size={18} /> CSV出力</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
